name: maquinista

services:
  postgres:
    image: postgres:16-alpine
    container_name: maquinista-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       maquinistadb
      POSTGRES_USER:     maquinista
      POSTGRES_PASSWORD: maquinista
    ports:
      - "5434:5432"
    volumes:
      - maquinista-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maquinista -d maquinistadb"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: maquinista-pgadmin
    restart: unless-stopped
    profiles: ["debug"]
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@maquinista.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  maquinista-pgdata:
